<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>小说喵</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f5f5f5;
font-family:
PingFang SC,
Helvetica,
Arial,
sans-serif;
color:#333;
}

img{
display:block;
width:100%;
}

a{
text-decoration:none;
color:inherit;
}

/* 顶部 */

.header{
height:165px;
background:linear-gradient(
180deg,
#7eb4ea 0%,
#ffffff 100%
);
padding:55px 18px 0;
position:relative;
}

.logo{
font-size:18px;
font-weight:500;
color:#5d9de5;
}

.capsule{
position:absolute;
top:35px;
right:18px;
width:72px;
height:30px;
background:#efefef;
border-radius:30px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:14px;
}

/* 分区 */

.section{
background:#fff;
padding:16px;
margin-bottom:10px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.section-title{
display:flex;
align-items:center;
font-size:17px;
font-weight:700;
color:#333;
}

.section-title::before{
content:"";
width:5px;
height:18px;
background:#69aff5;
border-radius:5px;
margin-right:8px;
}

.more{
font-size:14px;
color:#999;
}

/* 排行榜 */

.rank-list{
display:flex;
justify-content:space-between;
}

.rank-item{
width:31%;
}

.rank-cover{
height:155px;
border-radius:6px;
overflow:hidden;
}

.rank-title{
margin-top:10px;
font-size:15px;
line-height:20px;
height:20px;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

.rank-author{
margin-top:4px;
font-size:13px;
color:#999;
}

/* 小说列表 */

.grid{
display:grid;
grid-template-columns:
repeat(3,1fr);
gap:18px 16px;
}

.book-cover{
height:155px;
border-radius:6px;
overflow:hidden;
}

.book-title{
font-size:15px;
margin-top:8px;
line-height:20px;
}

.book-author{
font-size:13px;
color:#999;
margin-top:4px;
}

/* 底部导航 */

.bottom-space{
height:80px;
}

.tabbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#fff;
border-top:1px solid #ececec;
display:flex;
z-index:999;
}

.tab{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:12px;
color:#b7b7b7;
}

.tab svg{
width:22px;
height:22px;
margin-bottom:3px;
fill:currentColor;
}

.tab.active{
color:#68aef4;
}

/* 底部黑条 */

.home-indicator{
position:fixed;
bottom:6px;
left:50%;
transform:translateX(-50%);
width:135px;
height:5px;
background:#000;
border-radius:5px;
pointer-events:none;
}

</style>
</head>
